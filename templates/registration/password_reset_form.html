{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password | SmartLibrary Tracker</title>
    <!-- Local fonts + Tailwind + Lucide (offline safe) -->
    <link rel="stylesheet" href="{% static 'vendor/fonts/inter/latin.css' %}" />
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}" />
    <script src="{% static 'vendor/lucide/lucide.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <style>
      .reset-page {
        min-height: 100vh;
        background-image: url("{% static 'img/uew_entrance.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
      }
      .reset-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.82), rgba(30, 58, 138, 0.72));
        z-index: 1;
      }
      .reset-card {
        position: relative;
        z-index: 2;
        animation: reset-fade-in 500ms ease-out, reset-scale-in 500ms ease-out;
      }
      @keyframes reset-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes reset-scale-in {
        from { transform: scale(0.96) translateY(12px); }
        to { transform: scale(1) translateY(0); }
      }
      .sl-input:focus {
        border-color: rgba(59, 130, 246, 0.65);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.22), 0 2px 8px rgba(15, 23, 42, 0.06);
        background: rgba(255,255,255,0.98);
        transform: translateY(-1px);
      }
      @media (prefers-reduced-motion: reduce) {
        .reset-card {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="reset-page">
    <div class="flex items-center justify-center min-h-screen px-4 py-12">
      <div class="reset-card w-full max-w-md">
        <!-- Reset Card -->
        <div class="sl-card p-8 sm:p-10 rounded-3xl" style="background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1);">
          <!-- Logo and Branding -->
          <div class="text-center mb-10">
            <img
              src="{% static 'img/uew_logo.png' %}"
              alt="University logo"
              class="h-14 w-auto mx-auto mb-5"
              loading="eager"
            />
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2.5">
              Reset Password
            </h1>
            <p class="text-sm text-gray-600 leading-relaxed">
              Enter your email to receive a password reset link
            </p>
          </div>

          <!-- Form -->
          <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
              <div class="sl-card border border-red-200 bg-red-50/80 px-4 py-3.5 rounded-xl">
                <div class="flex items-start gap-2.5">
                  <i data-lucide="alert-circle" class="w-5 h-5 text-red-700 mt-0.5 flex-shrink-0"></i>
                  <div class="text-sm text-red-800 leading-relaxed">
                    {{ form.non_field_errors }}
                  </div>
                </div>
              </div>
            {% endif %}

            <!-- Email Field -->
            <div>
              <label for="{{ form.email.id_for_label }}" class="sl-label">
                Email Address
              </label>
              <div class="relative">
                <input
                  type="email"
                  name="{{ form.email.name }}"
                  id="{{ form.email.id_for_label }}"
                  class="sl-input transition-all duration-200"
                  placeholder="Enter your email address"
                  required
                  autocomplete="email"
                  value="{{ form.email.value|default:'' }}"
                />
              </div>
              {% if form.email.errors %}
                <p class="mt-1.5 text-sm text-red-600 flex items-center gap-1">
                  <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>
                  {{ form.email.errors.0 }}
                </p>
              {% endif %}
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="w-full mt-6 py-3.5 px-6 rounded-2xl font-semibold text-white transition-all duration-300 flex items-center justify-center gap-2.5"
              style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);"
              onmouseover="this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.45)'; this.style.transform='translateY(-2px)'"
              onmouseout="this.style.boxShadow='0 4px 14px rgba(102, 126, 234, 0.35)'; this.style.transform='translateY(0)'"
            >
              <i data-lucide="send" class="w-4 h-4" style="display: inline-flex; align-items: center;"></i>
              <span>Send Reset Link</span>
            </button>
          </form>

          <!-- Back to Login Link -->
          <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-sm text-accent hover:text-accent-hover font-medium transition-colors inline-flex items-center gap-1.5">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Back to Sign In
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        lucide.createIcons();
      });
    </script>
  </body>
</html>

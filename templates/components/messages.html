{% if messages %}
  <div class="app-messages">
    {% for message in messages %}
      <div class="app-alert app-alert--{{ message.tags|default:'info' }}">
        <div class="app-alert__icon">
          <i data-lucide="{% if message.tags == 'success' %}circle-check{% elif message.tags == 'warning' %}triangle-alert{% elif message.tags == 'error' %}circle-x{% else %}info{% endif %}"></i>
        </div>
        <div class="app-alert__content">{{ message }}</div>
      </div>
    {% endfor %}
  </div>
{% endif %}
